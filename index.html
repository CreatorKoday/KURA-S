<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わが家の在庫管理</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
  * { box-sizing: border-box; }

  :root {
    --ink: #1c1a17;
    --ink-soft: #2c2823;
    --cream: #f4efe4;
    --card: #fffdf9;
    --gold: #a9824f;
    --gold-deep: #8a6a3d;
    --gold-tint: #efe3cc;
    --forest: #3c5240;
    --text: #2a2622;
    --text-muted: #8c8172;
    --danger: #9c3b32;
    --border: rgba(28,26,23,0.12);
    --border-soft: rgba(28,26,23,0.08);
  }

  * { -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: 'Jost', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--cream);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(169,130,79,0.07), transparent 45%),
      radial-gradient(circle at 100% 20%, rgba(60,82,64,0.05), transparent 40%);
    background-attachment: fixed;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 28px 18px 60px;
    min-height: 100vh;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 26px;
    text-align: center;
    letter-spacing: 0.08em;
    margin: 4px 0 6px;
    color: var(--ink);
  }
  h1::after {
    content: "";
    display: block;
    width: 56px;
    height: 1px;
    background: var(--gold);
    margin: 14px auto 20px;
  }
  h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: 0.04em;
    margin: 28px 4px 12px;
  }
  h3.group-heading {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin: 24px 2px 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  h4.group-subheading {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 14px 4px 6px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 24px 20px;
    box-shadow: 0 1px 2px rgba(28,26,23,0.04), 0 8px 24px rgba(28,26,23,0.05);
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 16px 0 6px;
  }
  input, select {
    width: 100%;
    padding: 12px 13px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'Jost', sans-serif;
    font-size: 16px;
    background: var(--card);
    color: var(--text);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(169,130,79,0.15);
  }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; min-width: 0; }
  input[type="date"] { min-width: 0; padding-right: 6px; }
  input[type="date"]::-webkit-date-and-time-value { text-align: left; min-height: 1.2em; }

  button {
    border: none;
    border-radius: 3px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  button:active { transform: scale(0.98); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--ink); color: var(--gold-tint);
    margin-top: 18px; font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .btn-primary:hover { background: var(--ink-soft); }
  .btn-secondary {
    width: 100%; padding: 13px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--border);
    margin-top: 12px; font-size: 13px;
    letter-spacing: 0.08em;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold-deep); }
  .btn-logout {
    width: 100%; padding: 13px;
    background: transparent; color: var(--danger);
    margin-top: 16px; font-size: 13px;
  }
  #message { text-align: center; font-size: 13px; margin-top: 14px; min-height: 18px; }
  .msg-error { color: var(--danger); }
  .msg-ok { color: var(--forest); }
  .hidden { display: none; }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-muted); margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .top-bar strong { color: var(--ink); font-weight: 500; }
  .top-bar button {
    background: none; color: var(--danger); font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px;
  }

  .nav-bar {
    display: flex; gap: 0; margin-bottom: 24px;
    background: var(--ink); border-radius: 4px; padding: 4px;
  }
  .nav-btn {
    flex: 1; padding: 12px 4px; background: transparent; color: rgba(244,239,228,0.55);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 3px;
  }
  .nav-btn.active { background: rgba(244,239,228,0.08); color: var(--gold-tint); box-shadow: inset 0 -2px 0 var(--gold); }

  #scanner-wrap { margin-top: 12px; }
  #reader { width: 100%; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .scan-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin: 8px 0 0; }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 3px;
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(28,26,23,0.03);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-left: 3px solid var(--gold-tint);
    flex-wrap: wrap;
  }
  .item-card.expired { border-left-color: var(--danger); }
  .item-card.soon { border-left-color: var(--gold); }
  .item-info { flex: 1; min-width: 140px; }
  .item-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--ink); }
  .item-meta {
    font-size: 11px; color: var(--text-muted); margin-top: 4px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    letter-spacing: 0.02em;
  }
  .tag {
    display: inline-block; background: var(--gold-tint); color: var(--gold-deep);
    border-radius: 2px; padding: 2px 7px; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .expiry-label.expired { color: var(--danger); font-weight: 600; }
  .expiry-label.soon { color: var(--gold-deep); font-weight: 600; }
  .item-threshold {
    font-size: 11px; color: var(--text-muted); margin-top: 8px;
    display: flex; align-items: center; gap: 6px;
    letter-spacing: 0.04em;
  }
  .item-threshold input { width: 56px; padding: 4px 6px; font-size: 13px; }
  .qty-control { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: transparent; border: 1px solid var(--border); color: var(--ink);
    font-size: 16px; line-height: 1; padding: 0;
  }
  .qty-btn:hover { border-color: var(--gold); color: var(--gold-deep); }
  .qty-num { min-width: 34px; text-align: center; font-size: 15px; font-weight: 500; color: var(--ink); }
  .del-btn { background: none; color: var(--text-muted); font-size: 16px; padding: 2px 6px; }
  .del-btn:hover { color: var(--danger); }
  .empty-note {
    text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px 20px;
    border: 1px dashed var(--border); border-radius: 4px;
  }

  .review-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 3px;
    padding: 16px 18px; margin-bottom: 12px; position: relative;
  }
  .review-card .del-btn { position: absolute; top: 8px; right: 8px; }
  .review-note { font-size: 11px; color: var(--text-muted); margin: 6px 0 0; }

  .shopping-card {
    background: var(--card); border: 1px solid var(--border-soft); border-radius: 3px;
    padding: 14px 18px; margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(28,26,23,0.03);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border-left: 3px solid var(--forest);
  }
  .shopping-card.manual { border-left-color: var(--border); }
  .shopping-info { flex: 1; min-width: 0; }
  .shopping-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--ink); }
  .shopping-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.02em; }
  .check-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--forest); border: none; color: #fff; font-size: 15px; line-height: 1; padding: 0; flex-shrink: 0;
  }

  .filter-row { display: flex; gap: 8px; margin-bottom: 10px; }

  /* --- 自作カレンダー(日付選択) --- */
  .date-display { cursor: pointer; background: var(--card); }
  #calendar-overlay {
    position: fixed; inset: 0; background: rgba(28,26,23,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  #calendar-overlay.hidden { display: none; }
  #calendar-modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 20px;
    width: 100%; max-width: 340px;
  }
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .calendar-header button {
    background: transparent; border: 1px solid var(--border); color: var(--ink); width: 32px; height: 32px;
    border-radius: 50%; font-size: 16px; padding: 0; margin-top: 0;
  }
  #cal-month-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 17px; letter-spacing: 0.04em; color: var(--ink);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--gold);
    text-underline-offset: 4px;
  }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .calendar-grid .cal-dow { text-align: center; font-size: 10px; letter-spacing: 0.06em; color: var(--text-muted); padding: 4px 0; }
  .calendar-grid .cal-day {
    text-align: center; padding: 8px 0; border-radius: 3px; font-size: 13px;
    cursor: pointer; background: transparent; color: var(--text);
  }
  .calendar-grid .cal-day.empty { background: none; cursor: default; }
  .calendar-grid .cal-day.selected { background: var(--ink); color: var(--gold-tint); font-weight: 600; }
  .calendar-grid .cal-day.today {
    background: var(--gold-tint); color: var(--gold-deep); font-weight: 700;
    border: 1px solid var(--gold);
  }
  .calendar-grid .cal-day.today.selected { color: var(--gold-tint); background: var(--ink); border-color: var(--ink); }
  .yearmonth-picker { display: flex; gap: 8px; margin-bottom: 10px; }
  .yearmonth-picker select { padding: 10px; }
  .calendar-footer { display: flex; gap: 8px; margin-top: 14px; }
  .calendar-footer button { margin-top: 0; flex: 1; }
  #calendar-grid.hidden, #yearmonth-picker.hidden { display: none; }
</style>
</head>
<body>

<div class="wrap">
  <h1>🏠 わが家の在庫管理</h1>

  <div id="auth-card" class="card">
    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label for="password">パスワード(6文字以上)</label>
    <input type="password" id="password" placeholder="••••••••">

    <button class="btn-primary" id="login-btn">ログイン</button>
    <button class="btn-secondary" id="signup-btn">はじめて使う人はこちら(新規登録)</button>

    <div id="message"></div>
  </div>

  <div id="logged-in-area" class="hidden">

    <div class="top-bar">
      <span>ログイン中: <strong id="user-email"></strong></span>
      <button id="logout-btn">ログアウト</button>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" data-view="home">🏠 ホーム</button>
      <button class="nav-btn" data-view="shopping">🛒 買い物リスト</button>
      <button class="nav-btn" data-view="inventory">📦 在庫確認</button>
    </div>

    <div id="view-home" class="view">
      <div class="card">
        <button class="btn-secondary" id="scan-btn">📷 バーコードでスキャン</button>
        <button class="btn-secondary" id="photo-btn">📸 写真でAI判定</button>
        <input type="file" accept="image/*" capture="environment" id="photo-input" class="hidden">

        <div id="scanner-wrap" class="hidden">
          <div id="reader"></div>
          <p class="scan-hint">バーコード全体が枠に収まる距離(10〜15cmくらい)で、明るい場所で数秒待ってください</p>
          <button class="btn-secondary" id="close-scanner-btn">キャンセル</button>
        </div>

        <label for="item-name">商品名</label>
        <input type="text" id="item-name" placeholder="例: 牛乳">

        <div class="row2">
          <div>
            <label for="item-category">分類</label>
            <select id="item-category">
              <option value="食材">食材</option>
              <option value="日用品">日用品</option>
            </select>
          </div>
          <div>
            <label for="item-unit">単位</label>
            <input type="text" id="item-unit" placeholder="個・本など" value="個">
          </div>
        </div>

        <div class="row2">
          <div>
            <label for="item-quantity">数量</label>
            <select id="item-quantity"></select>
          </div>
          <div>
            <label for="item-expiry">消費・賞味期限(任意)</label>
            <input type="text" id="item-expiry" class="date-display" placeholder="タップして選択" readonly>
          </div>
        </div>

        <button class="btn-primary" id="add-item-btn">＋ 登録する</button>
        <div id="add-message"></div>
      </div>

      <div id="review-section" class="card hidden">
        <h2 style="margin-top:0;">写真から見つかった商品</h2>
        <p class="review-note">内容を確認・修正してから登録してください。同じ名前の商品がすでにあれば、数量がまとめて加算されます。</p>
        <div id="review-list"></div>
        <button class="btn-primary" id="register-all-btn">まとめて登録する</button>
        <button class="btn-secondary" id="cancel-review-btn">キャンセル</button>
        <div id="review-message"></div>
      </div>
    </div>

    <div id="view-shopping" class="view hidden">
      <h2 style="margin-top:0;">🛒 買い物リスト</h2>
      <div class="card">
        <label for="shopping-name">買いたいもの(在庫にないものもOK)</label>
        <input type="text" id="shopping-name" placeholder="例: 来客用のお菓子">
        <div class="row2">
          <div>
            <label for="shopping-quantity">数量</label>
            <select id="shopping-quantity"></select>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button class="btn-primary" id="add-shopping-btn" style="margin-top:12px;">＋ リストに追加</button>
          </div>
        </div>
        <div id="shopping-message"></div>
      </div>
      <div id="shopping-list"></div>
    </div>

    <div id="view-inventory" class="view hidden">
      <h2 style="margin-top:0;">📦 在庫確認</h2>
      <div class="filter-row">
        <select id="filter-category">
          <option value="">すべての分類</option>
          <option value="食材">食材</option>
          <option value="日用品">日用品</option>
        </select>
        <select id="filter-tag">
          <option value="">すべてのタグ</option>
        </select>
      </div>
      <div id="item-list"></div>
    </div>

  </div>
</div>

<!-- 日付選択用の自作カレンダー -->
<div id="calendar-overlay" class="hidden">
  <div id="calendar-modal">
    <div class="calendar-header">
      <button type="button" id="cal-prev">‹</button>
      <span id="cal-month-label"></span>
      <button type="button" id="cal-next">›</button>
    </div>
    <div id="yearmonth-picker" class="yearmonth-picker hidden">
      <select id="cal-year-select"></select>
      <select id="cal-month-select"></select>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
    <div class="calendar-footer">
      <button type="button" class="btn-secondary" id="cal-clear">未設定にする</button>
      <button type="button" class="btn-secondary" id="cal-close">閉じる</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://duzqatnbkaewgcblgvvs.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1enFhdG5ia2Fld2djYmxndnZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTYxNDksImV4cCI6MjA5OTM3MjE0OX0.34Wp5tGK-gvp-Qd9hWb1XX0oaE1ELorPF74oA8VYJuE";
  const GEMINI_API_KEY = "AQ.Ab8RN6IOwClGNZGx9p1pjBb5GbS7gCeiUSXFfdMX5E5f3lVhqQ";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const authCard = document.getElementById("auth-card");
  const loggedInArea = document.getElementById("logged-in-area");
  const messageBox = document.getElementById("message");
  const addMessageBox = document.getElementById("add-message");
  const reviewMessageBox = document.getElementById("review-message");
  const shoppingMessageBox = document.getElementById("shopping-message");
  const userEmailLabel = document.getElementById("user-email");
  const itemListEl = document.getElementById("item-list");
  const shoppingListEl = document.getElementById("shopping-list");

  function showMessage(el, text, isError) {
    el.textContent = text;
    el.className = isError ? "msg-error" : "msg-ok";
  }
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str ?? "";
    return div.innerHTML;
  }

  // 数量選択用のプルダウンを組み立てる(AIが検出した数量が範囲外でもその値を含める)
  function buildQuantityOptionsHtml(selectedValue, max) {
    max = max || 30;
    const selectedNum = Number(selectedValue) || 0;
    const effectiveMax = Math.max(max, selectedNum);
    let opts = "";
    for (let i = 0; i <= effectiveMax; i++) {
      opts += `<option value="${i}" ${i === selectedNum ? "selected" : ""}>${i}</option>`;
    }
    return opts;
  }
  function fillQuantitySelect(selectEl, min, max, selected) {
    selectEl.innerHTML = "";
    for (let i = min; i <= max; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      if (i === selected) opt.selected = true;
      selectEl.appendChild(opt);
    }
  }
  fillQuantitySelect(document.getElementById("item-quantity"), 0, 30, 1);
  fillQuantitySelect(document.getElementById("shopping-quantity"), 1, 30, 1);

  function switchView(view) {
    document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
    document.getElementById("view-" + view).classList.remove("hidden");
    document.querySelectorAll(".nav-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.view === view);
    });
    if (view === "shopping") loadShoppingList();
    if (view === "inventory") loadItems();
  }

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => switchView(btn.dataset.view));
  });

  function renderAuthState(session) {
    if (session && session.user) {
      authCard.classList.add("hidden");
      loggedInArea.classList.remove("hidden");
      userEmailLabel.textContent = session.user.email;
      switchView("home");
      loadShoppingList();
    } else {
      authCard.classList.remove("hidden");
      loggedInArea.classList.add("hidden");
    }
  }

  document.getElementById("signup-btn").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if (!email || !password) {
      showMessage(messageBox, "メールアドレスとパスワードを入力してください", true);
      return;
    }
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) {
      showMessage(messageBox, "登録エラー: " + error.message, true);
    } else {
      showMessage(messageBox, "登録できました!そのままログインをお試しください。", false);
    }
  });

  document.getElementById("login-btn").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if (!email || !password) {
      showMessage(messageBox, "メールアドレスとパスワードを入力してください", true);
      return;
    }
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      showMessage(messageBox, "ログインエラー: " + error.message, true);
    } else {
      showMessage(messageBox, "", false);
      renderAuthState(data.session);
    }
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {

  const ALL_TAGS = TAG_RULES.map(r => r.tag).concat(["その他"]);

  function guessTag(name) {
    const target = name || "";
    for (const rule of TAG_RULES) {

  async function upsertItemByName({ name, category, unit, quantity, expiry_date, low_stock_threshold, barcode }) {
    const cleanName = (name || "").trim();
    if (!cleanName) return null;

    const { data: existingList, error: findError } = await supabaseClient
      .from("items")
      .select("id, quantity, expiry_date, low_stock_threshold")
      .eq("name", cleanName)
      .limit(1);

    if (findError) console.error("既存商品の検索に失敗:", findError);

    const existing = existingList && existingList.length > 0 ? existingList[0] : null;

    if (existing) {
      const newQuantity = Number(existing.quantity) + Number(quantity || 0);
      const updatePayload = { quantity: newQuantity, updated_at: new Date().toISOString() };
      if (!existing.expiry_date && expiry_date) updatePayload.expiry_date = expiry_date;
      if (low_stock_threshold !== undefined && low_stock_threshold !== null) {
        updatePayload.low_stock_threshold = Number(low_stock_threshold);
      }
      const { error: updateError } = await supabaseClient.from("items").update(updatePayload).eq("id", existing.id);
      if (updateError) { console.error("商品の更新に失敗:", updateError); return null; }
      await syncShoppingListForItem(existing.id);
      return existing.id;
    } else {
      const { data: inserted, error: insertError } = await supabaseClient
        .from("items")
        .insert({
          name: cleanName,
          category,
          unit,
          quantity: Number(quantity || 0),
          expiry_date: expiry_date || null,
          low_stock_threshold: Number(low_stock_threshold || 1),
          barcode: barcode || null,
          tag: guessTag(cleanName)
        })
        .select()
        .single();
      if (insertError) { console.error("商品の登録に失敗:", insertError); return null; }
      await syncShoppingListForItem(inserted.id);
      return inserted.id;
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function identifyProductsWithAI(base64Data, mimeType) {
    const prompt = "この写真に写っている食品・日用品をすべて識別してください。" +
      "商品名(name)は、ブランド名や「おいしい」「厳選」などの宣伝文句を除いた、一般的な呼び方にしてください(例:「おいしい牛乳」ではなく「牛乳」、「〇〇農園のキャベツ」ではなく「キャベツ」)。" +
      "同じ種類の商品が複数写っている場合は1つの項目にまとめて、その個数をquantityに入れてください。" +
      "違う商品ごとに別の項目として出力してください。" +
      "categoryは「食材」か「日用品」のどちらか一方にしてください。" +
      "unitには個・本・パック・袋・箱など、その商品に自然な単位を日本語で入れてください。" +
      "商品が何も認識できない場合は空の配列を返してください。";

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-goog-api-key": GEMINI_API_KEY
        },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: mimeType, data: base64Data } }
            ]
          }],
          generationConfig: {
            temperature: 0,
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  name: { type: "STRING" },
                  category: { type: "STRING", enum: ["食材", "日用品"] },
                  unit: { type: "STRING" },
                  quantity: { type: "NUMBER" }
                },
                required: ["name", "category", "unit", "quantity"]
              }
            }
          }
        })
      }
    );

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "AIとの通信に失敗しました");
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return [];

    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error("AIの応答を解析できませんでした");
    }
  }

  async function loadItems() {
    let query = supabaseClient
      .from("items")
      .select("*")
      .order("expiry_date", { ascending: true, nullsFirst: false })
      .order("name", { ascending: true });

    const catFilter = document.getElementById("filter-category").value;
    const tagFilter = document.getElementById("filter-tag").value;
    if (catFilter) query = query.eq("category", catFilter);
    if (tagFilter) query = query.eq("tag", tagFilter);

    const { data, error } = await query;

    if (error) {
      itemListEl.innerHTML = '<div class="empty-note">読み込みエラー: ' + error.message + '</div>';
      return;
    }
    renderItems(data);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date();
    today.setHours(0,0,0,0);
    const target = new Date(dateStr + "T00:00:00");
    return Math.round((target - today) / (1000 * 60 * 60 * 24));
  }

  function renderItems(items) {
    if (!items || items.length === 0) {
      itemListEl.innerHTML = '<div class="empty-note">該当する商品がありません。</div>';
      return;
    }

    const groups = {};
    items.forEach(item => {
      const cat = item.category || "その他";
      const tag = item.tag || "その他";
      groups[cat] = groups[cat] || {};
      groups[cat][tag] = groups[cat][tag] || [];
      groups[cat][tag].push(item);
    });

    let html = "";
    Object.keys(groups).sort().forEach(cat => {
      html += `<h3 class="group-heading">${escapeHtml(cat)}</h3>`;
      Object.keys(groups[cat]).sort().forEach(tag => {
        html += `<h4 class="group-subheading">${escapeHtml(tag)}</h4>`;
        groups[cat][tag].forEach(item => { html += itemCardHtml(item); });
      });
    });
    itemListEl.innerHTML = html;
  }

  function itemCardHtml(item) {
    const d = daysUntil(item.expiry_date);
    let statusClass = "";
    let expiryHtml = "";
    if (d !== null) {
      if (d < 0) {
        statusClass = "expired";
        expiryHtml = '<span class="expiry-label expired">期限切れ(' + (-d) + '日前)</span>';
      } else if (d <= 3) {
        statusClass = "soon";
        expiryHtml = '<span class="expiry-label soon">あと' + d + '日: ' + item.expiry_date + '</span>';
      } else {
        expiryHtml = '<span>期限: ' + item.expiry_date + '</span>';
      }
    }
    const lowStock = Number(item.quantity) <= Number(item.low_stock_threshold);

    return `
      <div class="item-card ${statusClass}">
        <div class="item-info">
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-meta">
            ${expiryHtml}
            ${lowStock ? '<span class="expiry-label soon">在庫少なめ</span>' : ""}
          </div>
          <div class="item-threshold">
            最低数量:
            <input type="number" min="0" step="1" inputmode="numeric" pattern="[0-9]*"
              value="${item.low_stock_threshold}"
              onchange="updateThreshold('${item.id}', this.value)">
          </div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="adjustQty('${item.id}', ${item.quantity}, -1)">−</button>
          <span class="qty-num">${item.quantity}${escapeHtml(item.unit)}</span>
          <button class="qty-btn" onclick="adjustQty('${item.id}', ${item.quantity}, 1)">＋</button>
        </div>
        <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
      </div>
    `;
  }

  window.adjustQty = async function(id, currentQty, delta) {
    const newQty = Math.max(0, Number(currentQty) + delta);
    const { error } = await supabaseClient
      .from("items")
      .update({ quantity: newQty, updated_at: new Date().toISOString() })
      .eq("id", id);
    if (!error) {
      await syncShoppingListForItem(id);
      loadItems();
    } else {
      console.error("数量の更新に失敗:", error);
    }
  };

    const { error } = await supabaseClient
      .from("items")
      .update({ low_stock_threshold: v, updated_at: new Date().toISOString() })
      .eq("id", id);
    if (!error) {
      await syncShoppingListForItem(id);
    } else {
      console.error("最低数量の更新に失敗:", error);

  async function syncShoppingListForItem(itemId) {
    const { data: item, error: itemError } = await supabaseClient
      .from("items")
      .select("id, name, quantity, low_stock_threshold")
      .eq("id", itemId)
      .single();
    if (itemError || !item) {
      console.error("商品情報の取得に失敗(買い物リスト同期):", itemError);
      return;
    }

    const { data: existingList, error: findError } = await supabaseClient
      .from("shopping_list")
      .select("id")
      .eq("item_id", itemId)
      .eq("is_purchased", false)
      .limit(1);

    if (findError) {
      console.error("買い物リストの検索に失敗:", findError);
      return;
    }
    const existing = existingList && existingList.length > 0 ? existingList[0] : null;

    const isLow = Number(item.quantity) <= Number(item.low_stock_threshold);

    if (isLow && !existing) {
      const { error: insertError } = await supabaseClient.from("shopping_list").insert({
        item_id: item.id,
        name: item.name,
        quantity_needed: 1
      });
      if (insertError) console.error("買い物リストへの追加に失敗:", insertError);
    } else if (!isLow && existing) {
      const { error: deleteError } = await supabaseClient.from("shopping_list").delete().eq("id", existing.id);
      if (deleteError) console.error("買い物リストからの削除に失敗:", deleteError);
    }
  }

  window.markPurchased = async function(shoppingId, itemId, quantityNeeded) {
    const { error } = await supabaseClient.from("shopping_list").delete().eq("id", shoppingId);
    if (error) {
      console.error("買い物リストの更新に失敗:", error);
      return;

    if (itemId) {
      const { data: item } = await supabaseClient.from("items").select("quantity").eq("id", itemId).single();
      if (item) {
        await supabaseClient
          .from("items")
          .update({ quantity: Number(item.quantity) + Number(quantityNeeded), updated_at: new Date().toISOString() })
          .eq("id", itemId);
      }
    }

    loadShoppingList();
  };

  window.removeShoppingItem = async function(id) {
    if (!confirm("このリストの項目を削除しますか?")) return;
    const { error } = await supabaseClient.from("shopping_list").delete().eq("id", id);
    if (!error) loadShoppingList();
  };

  // ---------- 自作カレンダー(日付選択) ----------

  let calendarTargetInput = null;
  let calendarViewDate = new Date();

  function formatDateYMD(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function openCalendar(targetInput) {
    calendarTargetInput = targetInput;
    const existing = targetInput.value;
    calendarViewDate = existing ? new Date(existing + "T00:00:00") : new Date();
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
    document.getElementById("calendar-overlay").classList.remove("hidden");
  }

  function closeCalendar() {
    document.getElementById("calendar-overlay").classList.add("hidden");
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    calendarTargetInput = null;
  }

  function renderCalendar() {
    const year = calendarViewDate.getFullYear();
    const month = calendarViewDate.getMonth();
    document.getElementById("cal-month-label").textContent = year + "年" + (month + 1) + "月";

    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const selectedValue = calendarTargetInput ? calendarTargetInput.value : "";
    const todayStr = formatDateYMD(new Date());

    const dows = ["日", "月", "火", "水", "木", "金", "土"];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join("");

    for (let i = 0; i < startWeekday; i++) html += `<div class="cal-day empty"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = formatDateYMD(new Date(year, month, d));
      let cls = "cal-day";
      if (dateStr === selectedValue) cls += " selected";
      if (dateStr === todayStr) cls += " today";
      html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
    }

    document.getElementById("calendar-grid").innerHTML = html;

    document.querySelectorAll("#calendar-grid .cal-day:not(.empty)").forEach(el => {
      el.addEventListener("click", () => {
        if (calendarTargetInput) calendarTargetInput.value = el.dataset.date;
        closeCalendar();
      });
    });
  }

  document.getElementById("cal-prev").addEventListener("click", () => {
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() - 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  });
  document.getElementById("cal-next").addEventListener("click", () => {
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth() + 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  });

  // 年月ラベルをタップすると、プルダウンで直接ジャンプできるようにする
  const yearSelect = document.getElementById("cal-year-select");
  const monthSelect = document.getElementById("cal-month-select");
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m + "月";
    monthSelect.appendChild(opt);
  }

  document.getElementById("cal-month-label").addEventListener("click", () => {
    const realCurrentYear = new Date().getFullYear();
    const viewYear = calendarViewDate.getFullYear();
    yearSelect.innerHTML = "";
    for (let y = realCurrentYear; y <= realCurrentYear + 10; y++) {
      const opt = document.createElement("option");
      opt.value = y;
      opt.textContent = y + "年";
      if (y === viewYear) opt.selected = true;
      yearSelect.appendChild(opt);
    }
    monthSelect.value = calendarViewDate.getMonth() + 1;

    document.getElementById("yearmonth-picker").classList.remove("hidden");
    document.getElementById("calendar-grid").classList.add("hidden");
  });

  function applyYearMonthSelection() {
    calendarViewDate = new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, 1);
    document.getElementById("yearmonth-picker").classList.add("hidden");
    document.getElementById("calendar-grid").classList.remove("hidden");
    renderCalendar();
  }
  yearSelect.addEventListener("change", applyYearMonthSelection);
  monthSelect.addEventListener("change", applyYearMonthSelection);
  document.getElementById("cal-clear").addEventListener("click", () => {
    if (calendarTargetInput) calendarTargetInput.value = "";
    closeCalendar();
  });
  document.getElementById("cal-close").addEventListener("click", closeCalendar);
  document.getElementById("calendar-overlay").addEventListener("click", (e) => {
    if (e.target.id === "calendar-overlay") closeCalendar();
  });

  // 写真AI判定で動的に増える日付欄にも対応できるよう、クリックはイベント委譲で拾う
  document.addEventListener("click", (e) => {
    if (e.target.classList && e.target.classList.contains("date-display")) {
      openCalendar(e.target);
    }
  });
</script>

</body>
